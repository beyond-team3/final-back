spring:
  application:
    name: seedflowplus
  profiles:
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    root: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

google:
  gemini:
    api:
      url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"


# --- 모니터링 (Actuator & Prometheus) 설정 ---
management:
  endpoints:
    web:
      exposure:
        # health와 prometheus 엔드포인트만 외부에 노출
        include: health, prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: monsoon-backend

ncpms:
  api:
    url: "http://ncpms.rda.go.kr/npmsAPI/service"